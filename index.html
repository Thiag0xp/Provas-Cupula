<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cúpula - Gestão de Cargos</title>
    <style>
        :root { --gold: #d4af37; --bg: #050505; --card: #111; --border: #222; }
        body { background: var(--bg); color: #eee; font-family: 'Segoe UI', sans-serif; margin: 0; }
        
        header { background: #000; padding: 15px 5%; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index: 100; }
        nav { display: flex; justify-content: center; background: #080808; border-bottom: 1px solid var(--border); }
        nav button { background: none; border: none; color: #555; padding: 15px 25px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 11px; }
        nav button.active { color: var(--gold); border-bottom: 3px solid var(--gold); }
        
        .container { padding: 20px 5%; max-width: 1200px; margin: auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* GRADE DE 4 POR LINHA */
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; width: 100%; }
        @media (max-width: 850px) { .grid { grid-template-columns: repeat(2, 1fr); } }

        .card { background: var(--card); padding: 20px; border-radius: 10px; border: 1px solid var(--border); text-align: center; }
        .card img { width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; cursor: pointer; margin-bottom: 12px; background: #222; }
        
        /* ESTILO DAS TAGS */
        .tag { display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 10px; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; }
        .tag-comum { background: #333; color: #ccc; }
        .tag-importante { background: #441111; color: #ff6666; border: 1px solid #772222; }
        .tag-cupula { background: rgba(212, 175, 55, 0.15); color: var(--gold); border: 1px solid var(--gold); }

        .nome-membro { color: #fff; font-weight: bold; font-size: 14px; text-transform: uppercase; margin-bottom: 5px; }
        .info-txt { color: #888; font-size: 12px; margin: 3px 0; text-decoration: none; display: block; }

        /* PROVAS */
        .prova-item { background: var(--card); border: 1px solid var(--border); margin-bottom: 30px; padding: 20px; border-radius: 12px; }
        .media-box { width: 100%; margin-top: 15px; background: #000; border-radius: 8px; overflow: hidden; cursor: pointer; border: 1px solid #333; }
        .render-img, video, iframe { width: 100%; display: block; border: none; }
        video, iframe { aspect-ratio: 16/9; }

        /* ADMIN */
        #adminPanel { background: #0a0a0a; border: 1px solid var(--gold); padding: 25px; margin-top: 20px; display: none; border-radius: 10px; }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; background: #151515; border: 1px solid #333; color: white; border-radius: 6px; box-sizing: border-box; }
        .btn-save { background: var(--gold); color: black; font-weight: bold; border: none; padding: 14px; cursor: pointer; width: 100%; text-transform: uppercase; border-radius: 6px; margin-top: 10px; }
        .btn-del { color: #ff4444; background: rgba(255,0,0,0.1); border: 1px solid #422; cursor: pointer; font-size: 11px; padding: 8px; margin-top: 15px; border-radius: 4px; width: 100%; }
        
        #zoomOverlay, #loginOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.97); display:none; justify-content:center; align-items:center; z-index:1000; }
        #zoomBox { max-width: 90%; max-height: 90%; }
        #zoomBox img, #zoomBox video { max-width: 100%; max-height: 85vh; border: 1px solid var(--gold); border-radius: 4px; }
    </style>
</head>
<body>

<header>
    <div style="color: var(--gold); font-weight: bold; letter-spacing: 2px; font-size: 20px;">CÚPULA</div>
    <button onclick="document.getElementById('loginOverlay').style.display='flex'" style="background:none; border: 1px solid var(--gold); color: var(--gold); padding: 6px 18px; cursor: pointer; font-weight: bold; border-radius: 4px;">ADM</button>
</header>

<nav>
    <button onclick="tab('m')" id="nav-m" class="active">Membros</button>
    <button onclick="tab('p')" id="nav-p">Provas</button>
</nav>

<div class="container">
    <div id="tab-m" class="tab-content active"><div id="listM" class="grid"></div></div>
    <div id="tab-p" class="tab-content"><div id="listP"></div></div>

    <div id="adminPanel">
        <h3 style="color: var(--gold); text-align: center; margin-top: 0;">SISTEMA DE CADASTRO</h3>
        <select id="tipo" onchange="mudarForm()">
            <option value="M">CADASTRAR MEMBRO</option>
            <option value="P">CADASTRAR PROVA</option>
        </select>
        
        <div id="formM">
            <input type="text" id="nome" placeholder="Nome do Agente">
            <input type="text" id="idU" placeholder="ID Interno">
            <input type="text" id="tel" placeholder="Telefone">
            <label style="font-size: 11px; color: var(--gold); margin-top: 10px; display: block;">CARGO / HIERARQUIA:</label>
            <select id="cargo">
                <option value="comum">Membro Comum</option>
                <option value="importante">Cargo Importante</option>
                <option value="cupula">Membro Cúpula</option>
            </select>
        </div>

        <div id="formP" style="display:none;">
            <input type="text" id="tit" placeholder="Título da Prova">
            <input type="text" id="yt" placeholder="Link YouTube (Opcional)">
        </div>

        <div style="margin: 15px 0;">
            <label style="font-size: 11px; color: var(--gold); font-weight: bold;">SUBIR ARQUIVO (ATÉ 100MB):</label>
            <input type="file" id="up" accept="image/*,video/*">
        </div>

        <textarea id="obs" placeholder="Detalhes e Observações"></textarea>
        <button class="btn-save" id="btnSalvar" onclick="salvar()">SINCRONIZAR NOVO DADO</button>
    </div>
</div>

<div id="zoomOverlay" onclick="this.style.display='none'"><div id="zoomBox"></div></div>

<div id="loginOverlay">
    <div style="background:#111; padding:40px; border:1px solid var(--gold); text-align:center; border-radius: 12px; width: 280px;">
        <h4 style="color: var(--gold); margin-top: 0;">ACESSO RESTRITO</h4>
        <input type="password" id="senha" placeholder="Senha Autorizada">
        <button class="btn-save" onclick="logar()">ENTRAR</button>
    </div>
</div>

<script>
    const KEY = "cpx2026";
    let adm = false;
    let dbIDB;

    // BANCO DE DADOS (Zerei mudando o nome para CupulaFinalV2)
    const request = indexedDB.open("CupulaFinalV2", 1);
    request.onupgradeneeded = e => {
        dbIDB = e.target.result;
        dbIDB.createObjectStore("items", { keyPath: "id" });
    };
    request.onsuccess = e => { dbIDB = e.target.result; render(); };

    function tab(t) {
        document.querySelectorAll('.tab-content, nav button').forEach(e => e.classList.remove('active'));
        document.getElementById('tab-'+t).classList.add('active');
        document.getElementById('nav-'+t).classList.add('active');
    }

    function mudarForm() {
        const t = document.getElementById('tipo').value;
        document.getElementById('formM').style.display = t === 'M' ? 'block' : 'none';
        document.getElementById('formP').style.display = t === 'P' ? 'block' : 'none';
    }

    function logar() {
        if(document.getElementById('senha').value === KEY) {
            adm = true;
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            render();
        } else alert("Senha Incorreta!");
    }

    function abrir(src, tipo) {
        const box = document.getElementById('zoomBox');
        box.innerHTML = '';
        if(tipo === 'foto') box.innerHTML = `<img src="${src}">`;
        else if(tipo === 'video') box.innerHTML = `<video src="${src}" controls autoplay></video>`;
        else {
            const id = src.match(/(?:youtu\.be\/|youtube\.com\/watch\?v=)([^&]+)/)[1];
            box.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1" style="width:85vw; height:48vw;" allowfullscreen></iframe>`;
        }
        document.getElementById('zoomOverlay').style.display = 'flex';
    }

    async function salvar() {
        const btn = document.getElementById('btnSalvar');
        const file = document.getElementById('up').files[0];
        const tipo = document.getElementById('tipo').value;
        let midiaBase64 = "", mType = "";

        if(file) {
            btn.disabled = true;
            btn.innerText = "PROCESSANDO...";
            midiaBase64 = await new Promise(r => { 
                const rd = new FileReader(); 
                rd.onload = () => r(rd.result); 
                rd.readAsDataURL(file); 
            });
            mType = file.type.startsWith('image') ? 'foto' : 'video';
        }

        const data = {
            id: Date.now(),
            cat: tipo,
            nome: document.getElementById('nome').value || document.getElementById('tit').value,
            idU: document.getElementById('idU').value,
            tel: document.getElementById('tel').value,
            cargo: document.getElementById('cargo').value,
            midia: document.getElementById('yt').value || midiaBase64,
            mType: document.getElementById('yt').value ? 'yt' : mType,
            obs: document.getElementById('obs').value
        };

        const tx = dbIDB.transaction("items", "readwrite");
        tx.objectStore("items").add(data);
        tx.oncomplete = () => {
            btn.disabled = false;
            btn.innerText = "SINCRONIZAR NOVO DADO";
            document.querySelectorAll('input:not([type=password]), textarea').forEach(i => i.value = "");
            render();
        };
    }

    function apagar(id) {
        if(!confirm("Remover?")) return;
        const tx = dbIDB.transaction("items", "readwrite");
        tx.objectStore("items").delete(id);
        tx.oncomplete = () => render();
    }

    function render() {
        const listM = document.getElementById('listM');
        const listP = document.getElementById('listP');
        listM.innerHTML = ''; listP.innerHTML = '';
        if(!dbIDB) return;

        const tx = dbIDB.transaction("items", "readonly");
        tx.objectStore("items").openCursor().onsuccess = e => {
            const cursor = e.target.result;
            if(cursor) {
                const x = cursor.value;
                if(x.cat === 'M') {
                    // DEFINE A CLASSE DA TAG PELO CARGO
                    let tagClasse = x.cargo === 'cupula' ? 'tag-cupula' : (x.cargo === 'importante' ? 'tag-importante' : 'tag-comum');
                    let tagTexto = x.cargo === 'cupula' ? 'Membro Cúpula' : (x.cargo === 'importante' ? 'Cargo Importante' : 'Membro Comum');

                    listM.innerHTML += `
                    <div class="card">
                        <img src="${x.midia || 'https://via.placeholder.com/100'}" onclick="abrir('${x.midia}','foto')">
                        <div><span class="tag ${tagClasse}">${tagTexto}</span></div>
                        <div class="nome-membro">${x.nome}</div>
                        <div class="info-txt">ID: ${x.idU || '---'}</div>
                        <a href="tel:${x.tel}" class="info-txt">TEL: ${x.tel || '---'}</a>
                        ${adm ? `<button class="btn-del" onclick="apagar(${x.id})">REMOVER</button>` : ''}
                    </div>`;
                } else {
                    let mHtml = x.mType === 'yt' ? `<iframe src="https://www.youtube.com/embed/${x.midia.match(/(?:youtu\.be\/|youtube\.com\/watch\?v=)([^&]+)/)[1]}"></iframe>` : (x.mType === 'foto' ? `<img src="${x.midia}" class="render-img">` : `<video src="${x.midia}"></video>`);
                    listP.innerHTML += `
                    <div class="prova-item">
                        <div style="color:var(--gold); font-weight:bold; font-size:18px;">${x.nome}</div>
                        <div style="font-size:13px; color:#777; margin:10px 0;">${x.obs}</div>
                        <div class="media-box" onclick="abrir('${x.midia}','${x.mType}')">${mHtml}</div>
                        ${adm ? `<button class="btn-del" onclick="apagar(${x.id})">EXCLUIR</button>` : ''}
                    </div>`;
                }
                cursor.continue();
            }
        };
    }
</script>
</body>
</html>
