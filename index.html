<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cúpula - Sistema Integrado</title>
    <style>
        :root { --gold: #d4af37; --bg: #050505; --card: #111; --border: #222; }
        body { background: var(--bg); color: #eee; font-family: 'Segoe UI', sans-serif; margin: 0; }
        header { background: #000; padding: 15px 5%; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        nav { display: flex; justify-content: center; background: #080808; border-bottom: 1px solid var(--border); }
        nav button { background: none; border: none; color: #555; padding: 15px 25px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 11px; }
        nav button.active { color: var(--gold); border-bottom: 3px solid var(--gold); }
        .container { padding: 20px 5%; max-width: 800px; margin: auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Grid Membros */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .card { background: var(--card); padding: 15px; border-radius: 8px; border: 1px solid var(--border); text-align: center; }
        .card img { width: 60px; height: 60px; border-radius: 50%; border: 1px solid var(--gold); object-fit: cover; cursor: pointer; }

        /* Provas */
        .prova-item { background: var(--card); border: 1px solid var(--border); margin-bottom: 20px; padding: 15px; border-radius: 8px; }
        .media-box { width: 100%; margin-top: 10px; background: #000; border-radius: 5px; overflow: hidden; cursor: pointer; border: 1px solid #333; }
        img.render, video, iframe { width: 100%; display: block; border: none; }
        video, iframe { aspect-ratio: 16/9; }
        img.render { height: auto; max-height: 400px; object-fit: contain; }

        /* Admin */
        #adminPanel { background: #0a0a0a; border: 1px solid var(--gold); padding: 20px; margin-top: 20px; display: none; border-radius: 8px; }
        input, textarea, select { width: 100%; padding: 10px; margin: 5px 0; background: #151515; border: 1px solid #333; color: white; border-radius: 5px; box-sizing: border-box; }
        .btn-save { background: var(--gold); color: black; font-weight: bold; border: none; padding: 12px; cursor: pointer; width: 100%; text-transform: uppercase; border-radius: 5px; margin-top: 10px; }
        .btn-del { color: #ff4444; background: none; border: 1px solid #333; cursor: pointer; font-size: 10px; padding: 5px; margin-top: 8px; border-radius: 3px; width: 100%; }

        /* Overlay */
        #zoomOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display:none; justify-content:center; align-items:center; z-index:1000; }
        #zoomBox { max-width: 90%; max-height: 90%; border: 1px solid var(--gold); }
    </style>
</head>
<body>

<header>
    <div style="color: var(--gold); font-weight: bold; letter-spacing: 2px;">CÚPULA ADM</div>
    <button onclick="document.getElementById('loginOverlay').style.display='flex'" style="background:none; border: 1px solid var(--gold); color: var(--gold); padding: 5px 10px; cursor: pointer; font-size: 11px;">PAINEL</button>
</header>

<nav>
    <button onclick="switchTab('m')" id="btn-m" class="active">Membros</button>
    <button onclick="switchTab('p')" id="btn-p">Provas</button>
</nav>

<div class="container">
    <div id="tab-m" class="tab-content active"><div id="listM" class="grid"></div></div>
    <div id="tab-p" class="tab-content"><div id="listP"></div></div>

    <div id="adminPanel">
        <h3 style="color: var(--gold); margin:0 0 10px 0; font-size: 16px;">Novo Cadastro</h3>
        <select id="escolhaTipo" onchange="alternarCampos()">
            <option value="MEMBRO">CADASTRAR MEMBRO</option>
            <option value="PROVA">CADASTRAR PROVA</option>
        </select>
        
        <div id="areaMembro">
            <input type="text" id="membroNome" placeholder="Nome do Membro">
            <input type="text" id="membroID" placeholder="ID Único">
        </div>

        <div id="areaProva" style="display:none;">
            <input type="text" id="provaTitulo" placeholder="Título da Prova">
            <input type="text" id="provaLink" placeholder="Link YouTube (Opcional)">
        </div>

        <div style="margin: 10px 0;">
            <label style="font-size: 11px; color: var(--gold);">Upload de Arquivo (Foto/Vídeo):</label>
            <input type="file" id="arquivoPrincipal" accept="image/*,video/*">
        </div>

        <textarea id="observacaoGeral" placeholder="Observações/Detalhes"></textarea>
        <button class="btn-save" onclick="executarEnvio()">Sincronizar Agora</button>
    </div>
</div>

<div id="zoomOverlay" onclick="this.style.display='none'"><div id="zoomBox"></div></div>

<div id="loginOverlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; justify-content:center; align-items:center; z-index:999;">
    <div style="background:#111; padding:30px; border:1px solid var(--gold); text-align:center;">
        <input type="password" id="senhaAdm" placeholder="Senha">
        <button class="btn-save" onclick="validarAcesso()">Entrar</button>
    </div>
</div>

<script>
    const CHAVE = "123";
    let isAdm = false;

    function switchTab(t) {
        document.querySelectorAll('.tab-content, nav button').forEach(e => e.classList.remove('active'));
        document.getElementById('tab-'+t).classList.add('active');
        document.getElementById('btn-'+t).classList.add('active');
    }

    function alternarCampos() {
        const tipo = document.getElementById('escolhaTipo').value;
        document.getElementById('areaMembro').style.display = tipo === 'MEMBRO' ? 'block' : 'none';
        document.getElementById('areaProva').style.display = tipo === 'PROVA' ? 'block' : 'none';
    }

    function validarAcesso() {
        if(document.getElementById('senhaAdm').value === CHAVE) {
            isAdm = true;
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            renderizar();
        } else alert("Senha Inválida");
    }

    function abrirZoom(src, tipo) {
        const box = document.getElementById('zoomBox');
        box.innerHTML = '';
        if(tipo === 'foto') box.innerHTML = `<img src="${src}" style="width:100%">`;
        else if(tipo === 'video') box.innerHTML = `<video src="${src}" controls autoplay style="width:100%"></video>`;
        else {
            const id = src.match(/(?:youtu\.be\/|youtube\.com\/watch\?v=)([^&]+)/)[1];
            box.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1" style="width:80vw; height:45vw;" allowfullscreen></iframe>`;
        }
        document.getElementById('zoomOverlay').style.display = 'flex';
    }

    const lerArquivo = f => new Promise(r => {
        const reader = new FileReader();
        reader.onload = () => r(reader.result);
        reader.readAsDataURL(f);
    });

    async function executarEnvio() {
        let dados = JSON.parse(localStorage.getItem('cupula_final_db') || '{"membros":[],"provas":[]}');
        const tipoEscolhido = document.getElementById('escolhaTipo').value;
        const arquivo = document.getElementById('arquivoPrincipal').files[0];
        let base64 = "";
        let extensao = "";

        if(arquivo) {
            base64 = await lerArquivo(arquivo);
            extensao = arquivo.type.startsWith('image') ? 'foto' : 'video';
        }

        if(tipoEscolhido === 'MEMBRO') {
            const nome = document.getElementById('membroNome').value;
            if(!nome) return alert("Preencha o nome!");
            dados.membros.push({ uid: Date.now(), nome, id: document.getElementById('membroID').value, foto: base64 });
        } else {
            const titulo = document.getElementById('provaTitulo').value;
            const linkYt = document.getElementById('provaLink').value;
            if(!titulo) return alert("Preencha o título!");
            dados.provas.push({ 
                uid: Date.now(), 
                titulo, 
                midia: linkYt || base64, 
                tipo: linkYt ? 'youtube' : extensao,
                obs: document.getElementById('observacaoGeral').value 
            });
        }

        try {
            localStorage.setItem('cupula_final_db', JSON.stringify(dados));
            alert("Sincronizado com Sucesso!");
            // Limpa tudo
            document.querySelectorAll('input, textarea').forEach(i => i.value = "");
            renderizar();
        } catch(e) { alert("Erro: Arquivo muito grande!"); }
    }

    function apagar(cat, id) {
        if(!confirm("Remover permanentemente?")) return;
        let dados = JSON.parse(localStorage.getItem('cupula_final_db'));
        dados[cat] = dados[cat].filter(i => i.uid !== id);
        localStorage.setItem('cupula_final_db', JSON.stringify(dados));
        renderizar();
    }

    function renderizar() {
        const dados = JSON.parse(localStorage.getItem('cupula_final_db') || '{"membros":[],"provas":[]}');
        const listaM = document.getElementById('listM');
        const listaP = document.getElementById('listP');
        
        listaM.innerHTML = '';
        dados.membros.forEach(m => {
            listaM.innerHTML += `<div class="card">
                <img src="${m.foto || 'https://via.placeholder.com/60'}" onclick="abrirZoom('${m.foto}','foto')">
                <div style="font-size:12px; margin-top:5px;">${m.nome}</div>
                ${isAdm ? `<button class="btn-del" onclick="apagar('membros',${m.uid})">Apagar</button>` : ''}
            </div>`;
        });

        listaP.innerHTML = '';
        dados.provas.forEach(p => {
            let htmlMidia = "";
            if(p.tipo === 'youtube') {
                const id = p.midia.match(/(?:youtu\.be\/|youtube\.com\/watch\?v=)([^&]+)/)[1];
                htmlMidia = `<iframe src="https://www.youtube.com/embed/${id}"></iframe>`;
            } else if(p.tipo === 'foto') {
                htmlMidia = `<img src="${p.midia}" class="render">`;
            } else {
                htmlMidia = `<video><source src="${p.midia}"></video>`;
            }

            listaP.innerHTML += `<div class="prova-item">
                <div style="color:var(--gold); font-weight:bold;">${p.titulo}</div>
                <div style="font-size:11px; color:#888; margin-bottom:10px;">${p.obs}</div>
                <div class="media-box" onclick="abrirZoom('${p.midia}','${p.tipo}')">${htmlMidia}</div>
                ${isAdm ? `<button class="btn-del" onclick="apagar('provas',${p.uid})">Excluir Prova</button>` : ''}
            </div>`;
        });
    }
    renderizar();
</script>
</body>
</html>
