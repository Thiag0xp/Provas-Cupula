<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cúpula - Gestão de Elite</title>
    <style>
        :root { --gold: #d4af37; --bg: #050505; --card: #111; --border: #222; }
        body { background: var(--bg); color: #eee; font-family: 'Segoe UI', sans-serif; margin: 0; }
        
        header { background: #000; padding: 15px 5%; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        nav { display: flex; justify-content: center; background: #080808; border-bottom: 1px solid var(--border); }
        nav button { background: none; border: none; color: #555; padding: 15px 25px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 11px; }
        nav button.active { color: var(--gold); border-bottom: 3px solid var(--gold); }
        
        .container { padding: 20px 5%; max-width: 1200px; margin: auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* GRADE FIXA: 4 MEMBROS POR LINHA */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 20px; 
            width: 100%;
        }

        /* AJUSTE PARA CELULAR (2 por linha para não ficar espremido) */
        @media (max-width: 800px) { .grid { grid-template-columns: repeat(2, 1fr); } }

        .card { background: var(--card); padding: 20px; border-radius: 10px; border: 1px solid var(--border); text-align: center; transition: 0.3s; }
        .card:hover { border-color: var(--gold); }
        .card img { width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; cursor: pointer; margin-bottom: 12px; background: #222; }
        
        .nome-membro { color: var(--gold); font-weight: bold; font-size: 14px; text-transform: uppercase; margin-bottom: 5px; }
        .info-txt { color: #888; font-size: 12px; margin: 3px 0; text-decoration: none; display: block; }

        /* PROVAS */
        .prova-item { background: var(--card); border: 1px solid var(--border); margin-bottom: 30px; padding: 20px; border-radius: 12px; }
        .media-box { width: 100%; margin-top: 15px; background: #000; border-radius: 8px; overflow: hidden; cursor: pointer; border: 1px solid #333; }
        .render-img, video, iframe { width: 100%; display: block; border: none; }
        video, iframe { aspect-ratio: 16/9; }

        /* ADMIN */
        #adminPanel { background: #0a0a0a; border: 1px solid var(--gold); padding: 25px; margin-top: 20px; display: none; border-radius: 10px; }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; background: #151515; border: 1px solid #333; color: white; border-radius: 6px; box-sizing: border-box; }
        .btn-save { background: var(--gold); color: black; font-weight: bold; border: none; padding: 14px; cursor: pointer; width: 100%; text-transform: uppercase; border-radius: 6px; margin-top: 10px; }
        .btn-del { color: #ff4444; background: rgba(255,0,0,0.1); border: 1px solid #422; cursor: pointer; font-size: 11px; padding: 8px; margin-top: 15px; border-radius: 4px; width: 100%; }
        
        /* ZOOM */
        #zoomOverlay, #loginOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.96); display:none; justify-content:center; align-items:center; z-index:1000; }
        #zoomBox { max-width: 90%; max-height: 90%; }
        #zoomBox img, #zoomBox video { max-width: 100%; max-height: 85vh; border: 1px solid var(--gold); border-radius: 4px; }
    </style>
</head>
<body>

<header>
    <div style="color: var(--gold); font-weight: bold; letter-spacing: 2px; font-size: 20px;">CÚPULA</div>
    <button onclick="document.getElementById('loginOverlay').style.display='flex'" style="background:none; border: 1px solid var(--gold); color: var(--gold); padding: 6px 18px; cursor: pointer; font-weight: bold; border-radius: 4px;">PAINEL ADM</button>
</header>

<nav>
    <button onclick="tab('m')" id="nav-m" class="active">Membros</button>
    <button onclick="tab('p')" id="nav-p">Provas</button>
</nav>

<div class="container">
    <div id="tab-m" class="tab-content active">
        <div id="listM" class="grid"></div>
    </div>
    
    <div id="tab-p" class="tab-content">
        <div id="listP"></div>
    </div>

    <div id="adminPanel">
        <h3 style="color: var(--gold); text-align: center; margin-top: 0;">ADICIONAR REGISTRO</h3>
        <select id="tipo" onchange="mudarForm()">
            <option value="M">MEMBRO (Agente)</option>
            <option value="P">PROVA (Arquivo)</option>
        </select>
        
        <div id="formM">
            <input type="text" id="nome" placeholder="Nome do Membro">
            <input type="text" id="idU" placeholder="ID Interno">
            <input type="text" id="tel" placeholder="Telefone (Ex: 912345678)">
        </div>

        <div id="formP" style="display:none;">
            <input type="text" id="tit" placeholder="Título da Prova">
            <input type="text" id="yt" placeholder="Link YouTube (Se houver)">
        </div>

        <div style="margin: 15px 0;">
            <label style="font-size: 11px; color: var(--gold); font-weight: bold;">FOTO OU VÍDEO:</label>
            <input type="file" id="up" accept="image/*,video/*">
        </div>

        <textarea id="obs" placeholder="Observações e detalhes importantes..."></textarea>
        <button class="btn-save" onclick="salvar()">FINALIZAR E ENVIAR</button>
    </div>
</div>

<div id="zoomOverlay" onclick="this.style.display='none'"><div id="zoomBox"></div></div>

<div id="loginOverlay">
    <div style="background:#111; padding:40px; border:1px solid var(--gold); text-align:center; border-radius: 12px; width: 300px;">
        <h4 style="color: var(--gold); margin-top: 0;">ACESSO RESTRITO</h4>
        <input type="password" id="senha" placeholder="Senha CPX">
        <button class="btn-save" onclick="logar()">ENTRAR</button>
    </div>
</div>

<script>
    const KEY = "cpx2026";
    let adm = false;

    function tab(t) {
        document.querySelectorAll('.tab-content, nav button').forEach(e => e.classList.remove('active'));
        document.getElementById('tab-'+t).classList.add('active');
        document.getElementById('nav-'+t).classList.add('active');
    }

    function mudarForm() {
        const t = document.getElementById('tipo').value;
        document.getElementById('formM').style.display = t === 'M' ? 'block' : 'none';
        document.getElementById('formP').style.display = t === 'P' ? 'block' : 'none';
    }

    function logar() {
        if(document.getElementById('senha').value === KEY) {
            adm = true;
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            render();
        } else alert("Senha incorreta!");
    }

    function abrir(src, tipo) {
        const box = document.getElementById('zoomBox');
        box.innerHTML = '';
        if(tipo === 'foto') box.innerHTML = `<img src="${src}">`;
        else if(tipo === 'video') box.innerHTML = `<video src="${src}" controls autoplay></video>`;
        else if(tipo === 'yt') {
            const id = src.match(/(?:youtu\.be\/|youtube\.com\/watch\?v=)([^&]+)/)[1];
            box.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1" style="width:85vw; height:48vw;" allowfullscreen></iframe>`;
        }
        document.getElementById('zoomOverlay').style.display = 'flex';
    }

    async function salvar() {
        let db = JSON.parse(localStorage.getItem('cupula_cpx_final') || '{"m":[],"p":[]}');
        const tipo = document.getElementById('tipo').value;
        const file = document.getElementById('up').files[0];
        let base64 = "", mType = "";

        if(file) {
            base64 = await new Promise(r => { 
                const rd = new FileReader(); 
                rd.onload = () => r(rd.result); 
                rd.readAsDataURL(file); 
            });
            mType = file.type.startsWith('image') ? 'foto' : 'video';
        }

        if(tipo === 'M') {
            const n = document.getElementById('nome').value;
            if(!n) return alert("Nome é obrigatório!");
            db.m.push({ uid: Date.now(), n, id: document.getElementById('idU').value, t: document.getElementById('tel').value, f: base64 });
        } else {
            const t = document.getElementById('tit').value;
            const y = document.getElementById('yt').value;
            if(!t) return alert("Título é obrigatório!");
            db.p.push({ uid: Date.now(), t, m: y || base64, tipo: y ? 'yt' : mType, o: document.getElementById('obs').value });
        }

        try {
            localStorage.setItem('cupula_cpx_final', JSON.stringify(db));
            alert("Sincronizado!");
            document.querySelectorAll('input:not([type=password]), textarea').forEach(i => i.value = "");
            render();
        } catch(e) { alert("Erro: Foto muito pesada!"); }
    }

    function apagar(cat, id) {
        if(!confirm("Remover?")) return;
        let db = JSON.parse(localStorage.getItem('cupula_cpx_final'));
        db[cat] = db[cat].filter(x => x.uid !== id);
        localStorage.setItem('cupula_cpx_final', JSON.stringify(db));
        render();
    }

    function render() {
        const db = JSON.parse(localStorage.getItem('cupula_cpx_final') || '{"m":[],"p":[]}');
        const listM = document.getElementById('listM');
        const listP = document.getElementById('listP');
        
        listM.innerHTML = '';
        db.m.forEach(x => {
            listM.innerHTML += `
            <div class="card">
                <img src="${x.f || 'https://via.placeholder.com/90'}" onclick="abrir('${x.f}','foto')">
                <div class="nome-membro">${x.n}</div>
                <div class="info-txt">ID: ${x.id || '---'}</div>
                <a href="tel:${x.t}" class="info-txt">TEL: ${x.t || '---'}</a>
                ${adm ? `<button class="btn-del" onclick="apagar('m',${x.uid})">REMOVER</button>` : ''}
            </div>`;
        });

        listP.innerHTML = '';
        db.p.forEach(x => {
            let midiaHtml = "";
            if(x.tipo === 'yt') {
                const id = x.m.match(/(?:youtu\.be\/|youtube\.com\/watch\?v=)([^&]+)/)[1];
                midiaHtml = `<iframe src="https://www.youtube.com/embed/${id}"></iframe>`;
            } else if(x.tipo === 'foto') {
                midiaHtml = `<img src="${x.m}" class="render-img">`;
            } else {
                midiaHtml = `<video src="${x.m}"></video>`;
            }

            listP.innerHTML += `
            <div class="prova-item">
                <div style="color:var(--gold); font-weight:bold; font-size:18px;">${x.t}</div>
                <div style="font-size:13px; color:#777; margin:8px 0;">${x.o}</div>
                <div class="media-box" onclick="abrir('${x.m}','${x.tipo}')">${midiaHtml}</div>
                ${adm ? `<button class="btn-del" onclick="apagar('p',${x.uid})">EXCLUIR PROVA</button>` : ''}
            </div>`;
        });
    }
    render();
</script>
</body>
</html>
