<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cúpula - Arquivo Interno</title>
    <style>
        :root { --gold: #d4af37; --bg: #050505; --card: #111; --border: #222; }
        body { background: var(--bg); color: #eee; font-family: 'Segoe UI', sans-serif; margin: 0; }
        header { background: #000; padding: 20px 5%; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        nav { display: flex; justify-content: center; background: #080808; border-bottom: 1px solid var(--border); }
        nav button { background: none; border: none; color: #555; padding: 15px 30px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 11px; }
        nav button.active { color: var(--gold); border-bottom: 3px solid var(--gold); }
        .container { padding: 30px 5%; max-width: 900px; margin: auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 8px; border: 1px solid var(--border); text-align: center; }
        .card img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; }
        .prova-item { background: var(--card); border: 1px solid var(--border); margin-bottom: 25px; padding: 20px; border-radius: 10px; }
        .media-box { width: 100%; margin-top: 15px; background: #000; border-radius: 8px; overflow: hidden; border: 1px solid #333; }
        video, iframe, .img-render { width: 100%; display: block; border: none; }
        video, iframe { aspect-ratio: 16/9; }
        .img-render { height: auto; max-height: 500px; object-fit: contain; }
        #adminPanel { background: #0a0a0a; border: 1px solid var(--gold); padding: 20px; margin-top: 20px; display: none; border-radius: 8px; }
        input, textarea, select { width: 100%; padding: 10px; margin: 8px 0; background: #151515; border: 1px solid #333; color: white; border-radius: 5px; box-sizing: border-box; }
        .btn-save { background: var(--gold); color: black; font-weight: bold; border: none; padding: 12px; cursor: pointer; width: 100%; text-transform: uppercase; border-radius: 5px; }
        .btn-del { color: #ff4444; background: none; border: 1px solid #444; cursor: pointer; font-size: 10px; padding: 5px 10px; margin-top: 10px; border-radius: 4px; }
        #loginOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); display:none; justify-content:center; align-items:center; z-index:999; }
    </style>
</head>
<body>

<header>
    <div style="color: var(--gold); font-weight: bold; letter-spacing: 2px;">CÚPULA SISTEMA</div>
    <button onclick="document.getElementById('loginOverlay').style.display='flex'" style="background:none; border: 1px solid var(--gold); color: var(--gold); padding: 5px 12px; cursor: pointer;">ADM</button>
</header>

<nav>
    <button onclick="tab('membros')" id="b-membros" class="active">Membros</button>
    <button onclick="tab('provas')" id="b-provas">Provas</button>
</nav>

<div class="container">
    <div id="t-membros" class="tab-content active"><div id="listM" class="grid"></div></div>
    <div id="t-provas" class="tab-content"><div id="listP"></div></div>

    <div id="adminPanel">
        <h4 style="color: var(--gold); margin:0 0 10px 0;">Cadastrar Prova/Membro</h4>
        <select id="tipo" onchange="toggleF()">
            <option value="m">Membro</option>
            <option value="p">Prova (Foto ou Vídeo)</option>
        </select>
        
        <div id="fM">
            <input type="text" id="n" placeholder="Nome">
            <input type="text" id="id" placeholder="ID">
        </div>

        <div id="fP" style="display:none;">
            <input type="text" id="tit" placeholder="Título da Prova">
            <input type="text" id="link" placeholder="Link YouTube (opcional se subir arquivo)">
        </div>

        <div style="margin:10px 0;">
            <label style="font-size:11px; color:gray;">Subir Foto ou Vídeo:</label>
            <input type="file" id="fileUp" accept="image/*,video/*">
        </div>

        <textarea id="obs" placeholder="Observações"></textarea>
        <button class="btn-save" onclick="save()">Sincronizar</button>
    </div>
</div>

<div id="loginOverlay">
    <div style="background:#111; padding:30px; border:1px solid var(--gold); text-align:center; border-radius:8px;">
        <input type="password" id="pw" placeholder="Senha ADM">
        <button class="btn-save" onclick="login()">Entrar</button>
    </div>
</div>

<script>
    const PASS = "123";
    let adm = false;

    function tab(t) {
        document.querySelectorAll('.tab-content, nav button').forEach(e => e.classList.remove('active'));
        document.getElementById('t-'+t).classList.add('active');
        document.getElementById('b-'+t).classList.add('active');
    }

    function toggleF() {
        const isP = document.getElementById('tipo').value === 'p';
        document.getElementById('fM').style.display = isP ? 'none' : 'block';
        document.getElementById('fP').style.display = isP ? 'block' : 'none';
    }

    function login() {
        if(document.getElementById('pw').value === PASS) {
            adm = true;
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            render();
        } else alert("Senha incorreta");
    }

    const toB64 = f => new Promise((res) => {
        const r = new FileReader();
        r.onload = () => res(r.result);
        r.readAsDataURL(f);
    });

    async function save() {
        let db = JSON.parse(localStorage.getItem('cupula_db_v2') || '{"m":[],"p":[]}');
        const tipo = document.getElementById('tipo').value;
        const file = document.getElementById('fileUp').files[0];
        let midia = "";
        let mType = "";

        if(file) {
            midia = await toB64(file);
            mType = file.type.startsWith('image') ? 'foto' : 'video';
        }

        if(tipo === 'm') {
            db.m.push({ uid: Date.now(), n: document.getElementById('n').value, id: document.getElementById('id').value, foto: midia });
        } else {
            const url = document.getElementById('link').value;
            db.p.push({ 
                uid: Date.now(), 
                t: document.getElementById('tit').value, 
                src: url || midia, 
                tipo: url ? 'youtube' : mType,
                obs: document.getElementById('obs').value 
            });
        }

        try {
            localStorage.setItem('cupula_db_v2', JSON.stringify(db));
            render();
            alert("Sincronizado!");
            document.getElementById('fileUp').value = "";
        } catch(e) { alert("Memória cheia! Tente um arquivo menor ou use link."); }
    }

    function del(cat, id) {
        if(!confirm("Excluir?")) return;
        let db = JSON.parse(localStorage.getItem('cupula_db_v2'));
        db[cat] = db[cat].filter(i => i.uid !== id);
        localStorage.setItem('cupula_db_v2', JSON.stringify(db));
        render();
    }

    function render() {
        const db = JSON.parse(localStorage.getItem('cupula_db_v2') || '{"m":[],"p":[]}');
        const listM = document.getElementById('listM');
        const listP = document.getElementById('listP');
        
        listM.innerHTML = '';
        db.m.forEach(m => {
            listM.innerHTML += `<div class="card">
                <img src="${m.foto || 'https://via.placeholder.com/80'}">
                <h5>${m.n}</h5><p style="font-size:12px;color:gray;">ID: ${m.id}</p>
                ${adm ? `<button class="btn-del" onclick="del('m',${m.uid})">Apagar</button>` : ''}
            </div>`;
        });

        listP.innerHTML = '';
        db.p.forEach(p => {
            let player = "";
            const yt = p.src.match(/(?:youtu\.be\/|youtube\.com\/watch\?v=)([^&]+)/);
            
            if(yt) {
                player = `<iframe src="https://www.youtube.com/embed/${yt[1]}" allowfullscreen></iframe>`;
            } else if (p.tipo === 'foto' || p.src.startsWith('data:image')) {
                player = `<img src="${p.src}" class="img-render">`;
            } else {
                player = `<video controls><source src="${p.src}">Erro</video>`;
            }

            listP.innerHTML += `<div class="prova-item">
                <h3 style="color:var(--gold);margin:0;">${p.t}</h3>
                <p style="font-size:13px;color:#888;">${p.obs}</p>
                <div class="media-box">${player}</div>
                ${adm ? `<button class="btn-del" onclick="apagar_prova" onclick="del('p',${p.uid})">Excluir Prova</button>` : ''}
            </div>`;
        });
    }
    render();
</script>
</body>
</html>
