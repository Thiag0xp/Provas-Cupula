<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cúpula - Sistema VIP</title>
    <style>
        :root { --gold: #d4af37; --bg: #050505; --card: #111; --border: #222; }
        body { background: var(--bg); color: #eee; font-family: 'Segoe UI', sans-serif; margin: 0; }
        header { background: #000; padding: 15px 5%; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        nav { display: flex; justify-content: center; background: #080808; border-bottom: 1px solid var(--border); }
        nav button { background: none; border: none; color: #555; padding: 15px 25px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 11px; }
        nav button.active { color: var(--gold); border-bottom: 3px solid var(--gold); }
        
        .container { padding: 20px 5%; max-width: 1000px; margin: auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* AJUSTE: 4 POR LINHA */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); /* Força 4 colunas */
            gap: 20px; 
        }

        /* Responsivo: Se a tela for pequena (celular), ele ajusta para 2 por linha */
        @media (max-width: 768px) {
            .grid { grid-template-columns: repeat(2, 1fr); }
        }

        .card { background: var(--card); padding: 20px; border-radius: 10px; border: 1px solid var(--border); text-align: center; }
        .card img { width: 85px; height: 85px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; cursor: pointer; margin-bottom: 10px; }
        .nome-membro { color: var(--gold); font-weight: bold; font-size: 14px; margin-bottom: 5px; text-transform: uppercase; }
        .info-link { color: #888; text-decoration: none; font-size: 12px; display: block; margin: 2px 0; }
        .info-link:hover { color: var(--gold); }

        /* Provas */
        .prova-item { background: var(--card); border: 1px solid var(--border); margin-bottom: 25px; padding: 15px; border-radius: 8px; }
        .media-box { width: 100%; margin-top: 10px; background: #000; border-radius: 5px; overflow: hidden; cursor: pointer; border: 1px solid #333; }
        img.render, video, iframe { width: 100%; display: block; border: none; }
        video, iframe { aspect-ratio: 16/9; }

        /* Admin & Modais */
        #adminPanel { background: #0a0a0a; border: 1px solid var(--gold); padding: 20px; margin-top: 20px; display: none; border-radius: 8px; }
        input, textarea, select { width: 100%; padding: 12px; margin: 6px 0; background: #151515; border: 1px solid #333; color: white; border-radius: 5px; box-sizing: border-box; }
        .btn-save { background: var(--gold); color: black; font-weight: bold; border: none; padding: 12px; cursor: pointer; width: 100%; text-transform: uppercase; border-radius: 5px; }
        .btn-del { color: #ff4444; background: rgba(255,0,0,0.05); border: 1px solid #422; cursor: pointer; font-size: 10px; padding: 8px; margin-top: 10px; border-radius: 4px; width: 100%; }
        
        #zoomOverlay, #loginOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); display:none; justify-content:center; align-items:center; z-index:1000; }
        #zoomBox { max-width: 90%; max-height: 90%; border: 1px solid var(--gold); }
    </style>
</head>
<body>

<header>
    <div style="color: var(--gold); font-weight: bold; letter-spacing: 2px;">CÚPULA ADM</div>
    <button onclick="document.getElementById('loginOverlay').style.display='flex'" style="background:none; border: 1px solid var(--gold); color: var(--gold); padding: 5px 15px; cursor: pointer;">PAINEL</button>
</header>

<nav>
    <button onclick="switchTab('m')" id="btn-m" class="active">Membros</button>
    <button onclick="switchTab('p')" id="btn-p">Provas</button>
</nav>

<div class="container">
    <div id="tab-m" class="tab-content active"><div id="listM" class="grid"></div></div>
    <div id="tab-p" class="tab-content"><div id="listP"></div></div>

    <div id="adminPanel">
        <h3 style="color: var(--gold); text-align: center;">CADASTRO</h3>
        <select id="escolhaTipo" onchange="alternarCampos()">
            <option value="MEMBRO">NOVO MEMBRO</option>
            <option value="PROVA">NOVA PROVA</option>
        </select>
        
        <div id="areaMembro">
            <input type="text" id="membroNome" placeholder="Nome">
            <input type="text" id="membroID" placeholder="ID">
            <input type="text" id="membroNum" placeholder="Telemóvel">
        </div>

        <div id="areaProva" style="display:none;">
            <input type="text" id="provaTitulo" placeholder="Título">
            <input type="text" id="provaLink" placeholder="Link YouTube">
        </div>

        <div style="margin: 10px 0;">
            <label style="font-size: 11px; color: var(--gold);">ARQUIVO:</label>
            <input type="file" id="arquivoPrincipal" accept="image/*,video/*">
        </div>

        <textarea id="observacaoGeral" placeholder="Observações"></textarea>
        <button class="btn-save" onclick="executarEnvio()">SALVAR</button>
    </div>
</div>

<div id="zoomOverlay" onclick="this.style.display='none'"><div id="zoomBox"></div></div>

<div id="loginOverlay">
    <div style="background:#111; padding:30px; border:1px solid var(--gold); text-align:center; border-radius: 8px;">
        <h4 style="color: var(--gold); margin-top: 0;">ACESSO RESTRITO</h4>
        <input type="password" id="senhaAdm" placeholder="Senha ADM">
        <button class="btn-save" onclick="validarAcesso()">ENTRAR</button>
    </div>
</div>

<script>
    const CHAVE = "cpx2026";
    let isAdm = false;

    function switchTab(t) {
        document.querySelectorAll('.tab-content, nav button').forEach(e => e.classList.remove('active'));
        document.getElementById('tab-'+t).classList.add('active');
        document.getElementById('btn-'+t).classList.add('active');
    }

    function alternarCampos() {
        const tipo = document.getElementById('escolhaTipo').value;
        document.getElementById('areaMembro').style.display = tipo === 'MEMBRO' ? 'block' : 'none';
        document.getElementById('areaProva').style.display = tipo === 'PROVA' ? 'block' : 'none';
    }

    function validarAcesso() {
        if(document.getElementById('senhaAdm').value === CHAVE) {
            isAdm = true;
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            renderizar();
        } else alert("Incorreto!");
    }

    function abrirZoom(src, tipo) {
        const box = document.getElementById('zoomBox');
        box.innerHTML = '';
        if(tipo === 'foto') box.innerHTML = `<img src="${src}" style="width:100%; max-height:85vh; object-fit:contain;">`;
        else if(tipo === 'video') box.innerHTML = `<video src="${src}" controls autoplay style="width:100%; max-height:85vh;"></video>`;
        else {
            const id = src.match(/(?:youtu\.be\/|youtube\.com\/watch\?v=)([^&]+)/)[1];
            box.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1" style="width:85vw; height:48vw;" allowfullscreen></iframe>`;
        }
        document.getElementById('zoomOverlay').style.display = 'flex';
    }

    const lerArquivo = f => new Promise(r => {
        const reader = new FileReader();
        reader.onload = () => r(reader.result);
        reader.readAsDataURL(f);
    });

    async function executarEnvio() {
        let dados = JSON.parse(localStorage.getItem('cupula_final_v6') || '{"membros":[],"provas":[]}');
        const tipoEscolhido = document.getElementById('escolhaTipo').value;
        const arquivo = document.getElementById('arquivoPrincipal').files[0];
        let base64 = "", extensao = "";

        if(arquivo) {
            base64 = await lerArquivo(arquivo);
            extensao = arquivo.type.startsWith('image') ? 'foto' : 'video';
        }

        if(tipoEscolhido === 'MEMBRO') {
            dados.membros.push({ 
                uid: Date.now(), 
                nome: document.getElementById('membroNome').value, 
                id: document.getElementById('membroID').value, 
                num: document.getElementById('membroNum').value,
                foto: base64 
            });
        } else {
            const yt = document.getElementById('provaLink').value;
            dados.provas.push({ 
                uid: Date.now(), 
                titulo: document.getElementById('provaTitulo').value, 
                midia: yt || base64, 
                tipo: yt ? 'youtube' : extensao,
                obs: document.getElementById('observacaoGeral').value 
            });
        }

        localStorage.setItem('cupula_final_v6', JSON.stringify(dados));
        alert("Salvo!");
        document.querySelectorAll('input:not([type=password]), textarea').forEach(i => i.value = "");
        renderizar();
    }

    function apagar(cat, id) {
        if(!confirm("Apagar?")) return;
        let dados = JSON.parse(localStorage.getItem('cupula_final_v6'));
        dados[cat] = dados[cat].filter(i => i.uid !== id);
        localStorage.setItem('cupula_final_v6', JSON.stringify(dados));
        renderizar();
    }

    function renderizar() {
        const dados = JSON.parse(localStorage.getItem('cupula_final_v6') || '{"membros":[],"provas":[]}');
        const listaM = document.getElementById('listM');
        const listaP = document.getElementById('listP');
        
        listaM.innerHTML = '';
        dados.membros.forEach(m => {
            listaM.innerHTML += `<div class="card">
                <img src="${m.foto || 'https://via.placeholder.com/80'}" onclick="abrirZoom('${m.foto}','foto')">
                <div class="nome-membro">${m.nome}</div>
                <div class="info-link">ID: ${m.id || '---'}</div>
                <a href="tel:${m.num}" class="info-link">TEL: ${m.num || '---'}</a>
                ${isAdm ? `<button class="btn-del" onclick="apagar('membros',${m.uid})">REMOVER</button>` : ''}
            </div>`;
        });

        listaP.innerHTML = '';
        dados.provas.forEach(p => {
            let htmlMidia = p.tipo === 'youtube' ? `<iframe src="https://www.youtube.com/embed/${p.midia.match(/(?:youtu\.be\/|youtube\.com\/watch\?v=)([^&]+)/)[1]}"></iframe>` : (p.tipo === 'foto' ? `<img src="${p.midia}" class="render">` : `<video src="${p.midia}"></video>`);
            listaP.innerHTML += `<div class="prova-item">
                <div style="color:var(--gold); font-weight:bold;">${p.titulo}</div>
                <div style="font-size:11px; color:#888; margin-bottom:10px;">${p.obs}</div>
                <div class="media-box" onclick="abrirZoom('${p.midia}','${p.tipo}')">${htmlMidia}</div>
                ${isAdm ? `<button class="btn-del" onclick="apagar('provas',${p.uid})">EXCLUIR</button>` : ''}
            </div>`;
        });
    }
    renderizar();
</script>
</body>
</html>
