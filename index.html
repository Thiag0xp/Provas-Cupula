<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cúpula - Sistema VIP</title>
    <style>
        :root { --gold: #d4af37; --bg: #050505; --card: #111; --border: #222; }
        body { background: var(--bg); color: #eee; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; }
        
        header { background: #000; padding: 15px 5%; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        nav { display: flex; justify-content: center; background: #080808; border-bottom: 1px solid var(--border); }
        nav button { background: none; border: none; color: #555; padding: 15px 25px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 11px; }
        nav button.active { color: var(--gold); border-bottom: 3px solid var(--gold); }
        
        .container { padding: 20px 5%; max-width: 1100px; margin: auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* GRADE FIXA DE 4 COLUNAS */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 15px; 
        }

        /* AJUSTE PARA CELULAR */
        @media (max-width: 800px) { .grid { grid-template-columns: repeat(2, 1fr); } }

        .card { background: var(--card); padding: 15px; border-radius: 8px; border: 1px solid var(--border); text-align: center; position: relative; }
        .card img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; cursor: pointer; margin-bottom: 10px; background: #222; }
        .nome-membro { color: var(--gold); font-weight: bold; font-size: 13px; margin-bottom: 5px; text-transform: uppercase; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .info-txt { color: #888; font-size: 11px; margin: 2px 0; text-decoration: none; display: block; }
        .info-txt:hover { color: var(--gold); }

        /* PROVAS */
        .prova-item { background: var(--card); border: 1px solid var(--border); margin-bottom: 25px; padding: 15px; border-radius: 8px; }
        .media-box { width: 100%; margin-top: 10px; background: #000; border-radius: 5px; overflow: hidden; cursor: pointer; border: 1px solid #333; position: relative; }
        .render-img, video, iframe { width: 100%; display: block; border: none; }
        video, iframe { aspect-ratio: 16/9; }
        .render-img { height: auto; max-height: 400px; object-fit: contain; }

        /* ADMIN */
        #adminPanel { background: #0a0a0a; border: 1px solid var(--gold); padding: 20px; margin-top: 20px; display: none; border-radius: 8px; }
        input, textarea, select { width: 100%; padding: 12px; margin: 6px 0; background: #151515; border: 1px solid #333; color: white; border-radius: 5px; box-sizing: border-box; font-size: 14px; }
        .btn-save { background: var(--gold); color: black; font-weight: bold; border: none; padding: 12px; cursor: pointer; width: 100%; text-transform: uppercase; border-radius: 5px; margin-top: 10px; }
        .btn-del { color: #ff4444; background: rgba(255,0,0,0.05); border: 1px solid #422; cursor: pointer; font-size: 10px; padding: 8px; margin-top: 10px; border-radius: 4px; width: 100%; }
        
        /* OVERLAYS */
        #zoomOverlay, #loginOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); display:none; justify-content:center; align-items:center; z-index:1000; }
        #zoomBox { max-width: 90%; max-height: 90%; display: flex; justify-content: center; }
        #zoomBox img, #zoomBox video { max-width: 100%; max-height: 85vh; border: 1px solid var(--gold); }
    </style>
</head>
<body>

<header>
    <div style="color: var(--gold); font-weight: bold; letter-spacing: 2px; font-size: 18px;">CÚPULA</div>
    <button onclick="document.getElementById('loginOverlay').style.display='flex'" style="background:none; border: 1px solid var(--gold); color: var(--gold); padding: 5px 15px; cursor: pointer; font-weight: bold;">ADM</button>
</header>

<nav>
    <button onclick="tab('m')" id="nav-m" class="active">Membros</button>
    <button onclick="tab('p')" id="nav-p">Arquivos de Prova</button>
</nav>

<div class="container">
    <div id="tab-m" class="tab-content active"><div id="listM" class="grid"></div></div>
    
    <div id="tab-p" class="tab-content"><div id="listP"></div></div>

    <div id="adminPanel">
        <h3 style="color: var(--gold); text-align: center; margin-top: 0;">NOVO REGISTRO</h3>
        <select id="tipoItem" onchange="mudarForm()">
            <option value="M">CADASTRAR MEMBRO</option>
            <option value="P">CADASTRAR PROVA</option>
        </select>
        
        <div id="formM">
            <input type="text" id="mNome" placeholder="Nome Completo">
            <input type="text" id="mID" placeholder="ID Interno">
            <input type="text" id="mTel" placeholder="Telemóvel (Ex: 912345678)">
        </div>

        <div id="formP" style="display:none;">
            <input type="text" id="pTit" placeholder="Título da Prova">
            <input type="text" id="pLink" placeholder="Link do YouTube (Opcional)">
        </div>

        <div style="margin: 10px 0;">
            <label style="font-size: 11px; color: var(--gold); display: block; margin-bottom: 4px;">UPLOAD (FOTO OU VÍDEO):</label>
            <input type="file" id="fUpload" accept="image/*,video/*">
        </div>

        <textarea id="obs" placeholder="Observações Gerais"></textarea>
        <button class="btn-save" onclick="salvar()">SALVAR AGORA</button>
    </div>
</div>

<div id="zoomOverlay" onclick="this.style.display='none'"><div id="zoomBox"></div></div>

<div id="loginOverlay">
    <div style="background:#111; padding:30px; border:1px solid var(--gold); text-align:center; border-radius: 8px;">
        <h4 style="color: var(--gold); margin-top: 0;">ACESSO RESTRITO</h4>
        <input type="password" id="passInput" placeholder="Senha ADM">
        <button class="btn-save" onclick="autenticar()">ENTRAR</button>
    </div>
</div>

<script>
    const KEY = "cpx2026";
    let logado = false;

    function tab(t) {
        document.querySelectorAll('.tab-content, nav button').forEach(e => e.classList.remove('active'));
        document.getElementById('tab-'+t).classList.add('active');
        document.getElementById('nav-'+t).classList.add('active');
    }

    function mudarForm() {
        const tipo = document.getElementById('tipoItem').value;
        document.getElementById('formM').style.display = tipo === 'M' ? 'block' : 'none';
        document.getElementById('formP').style.display = tipo === 'P' ? 'block' : 'none';
    }

    function autenticar() {
        if(document.getElementById('passInput').value === KEY) {
            logado = true;
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            render();
        } else {
            alert("Senha Incorreta!");
        }
    }

    function zoom(src, tipo) {
        const box = document.getElementById('zoomBox');
        box.innerHTML = '';
        if(tipo === 'foto') box.innerHTML = `<img src="${src}">`;
        else if(tipo === 'video') box.innerHTML = `<video src="${src}" controls autoplay></video>`;
        else if(tipo === 'yt') {
            const id = src.match(/(?:youtu\.be\/|youtube\.com\/watch\?v=)([^&]+)/)[1];
            box.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1" style="width:80vw; height:45vw;" allowfullscreen></iframe>`;
        }
        document.getElementById('zoomOverlay').style.display = 'flex';
    }

    async function salvar() {
        let db = JSON.parse(localStorage.getItem('cupula_v10') || '{"m":[],"p":[]}');
        const tipo = document.getElementById('tipoItem').value;
        const file = document.getElementById('fUpload').files[0];
        let midia = "", mExt = "";

        if(file) {
            midia = await new Promise(r => { 
                const rd = new FileReader(); 
                rd.onload = () => r(rd.result); 
                rd.readAsDataURL(file); 
            });
            mExt = file.type.startsWith('image') ? 'foto' : 'video';
        }

        if(tipo === 'M') {
            const n = document.getElementById('mNome').value;
            if(!n) return alert("Nome obrigatório!");
            db.m.push({ idt: Date.now(), n, id: document.getElementById('mID').value, tel: document.getElementById('mTel').value, f: midia });
        } else {
            const t = document.getElementById('pTit').value;
            const l = document.getElementById('pLink').value;
            if(!t) return alert("Título obrigatório!");
            db.p.push({ idt: Date.now(), t, m: l || midia, tipo: l ? 'yt' : mExt, o: document.getElementById('obs').value });
        }

        localStorage.setItem('cupula_v10', JSON.stringify(db));
        alert("Sincronizado com sucesso!");
        document.querySelectorAll('input:not([type=password]), textarea').forEach(i => i.value = "");
        render();
    }

    function apagar(cat, id) {
        if(!confirm("Remover?")) return;
        let db = JSON.parse(localStorage.getItem('cupula_v10'));
        db[cat] = db[cat].filter(x => x.idt !== id);
        localStorage.setItem('cupula_v10', JSON.stringify(db));
        render();
    }

    function render() {
        const db = JSON.parse(localStorage.getItem('cupula_v10') || '{"m":[],"p":[]}');
        const listM = document.getElementById('listM');
        const listP = document.getElementById('listP');
        
        listM.innerHTML = '';
        db.m.forEach(x => {
            listM.innerHTML += `
            <div class="card">
                <img src="${x.f || 'https://via.placeholder.com/80'}" onclick="zoom('${x.f}','foto')">
                <div class="nome-membro">${x.n}</div>
                <div class="info-txt">ID: ${x.id || '---'}</div>
                <a href="tel:${x.tel}" class="info-txt">TEL: ${x.tel || '---'}</a>
                ${logado ? `<button class="btn-del" onclick="apagar('m',${x.idt})">REMOVER</button>` : ''}
            </div>`;
        });

        listP.innerHTML = '';
        db.p.forEach(x => {
            let itemMidia = "";
            if(x.tipo === 'yt') {
                const id = x.m.match(/(?:youtu\.be\/|youtube\.com\/watch\?v=)([^&]+)/)[1];
                itemMidia = `<iframe src="https://www.youtube.com/embed/${id}"></iframe>`;
            } else if(x.tipo === 'foto') {
                itemMidia = `<img src="${x.m}" class="render-img">`;
            } else {
                itemMidia = `<video src="${x.m}"></video>`;
            }

            listP.innerHTML += `
            <div class="prova-item">
                <div style="color:var(--gold); font-weight:bold; font-size:16px;">${x.t}</div>
                <div style="font-size:11px; color:#666; margin:5px 0;">${x.o}</div>
                <div class="media-box" onclick="zoom('${x.m}','${x.tipo}')">${itemMidia}</div>
                ${logado ? `<button class="btn-del" onclick="apagar('p',${x.idt})">EXCLUIR PROVA</button>` : ''}
            </div>`;
        });
    }
    render();
</script>
</body>
</html>
