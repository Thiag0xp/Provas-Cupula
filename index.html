<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cúpula - Arquivo Interno</title>
    <style>
        :root { --gold: #d4af37; --bg: #050505; --card: #111; --border: #222; }
        body { background: var(--bg); color: #eee; font-family: 'Segoe UI', sans-serif; margin: 0; }
        
        header { background: #000; padding: 20px 5%; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        nav { display: flex; justify-content: center; background: #080808; border-bottom: 1px solid var(--border); }
        nav button { background: none; border: none; color: #555; padding: 15px 30px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 11px; }
        nav button.active { color: var(--gold); border-bottom: 3px solid var(--gold); }

        .container { padding: 30px 5%; max-width: 900px; margin: auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Grid Membros */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .card { background: var(--card); padding: 15px; border-radius: 8px; border: 1px solid var(--border); text-align: center; cursor: pointer; }
        .card img { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; }

        /* Estilo das Provas */
        .prova-item { background: var(--card); border: 1px solid var(--border); margin-bottom: 25px; padding: 20px; border-radius: 10px; position: relative; }
        .media-box { width: 100%; margin-top: 10px; background: #000; border-radius: 8px; overflow: hidden; border: 1px solid #333; cursor: pointer; }
        video, iframe, .img-render { width: 100%; display: block; border: none; }
        video, iframe { aspect-ratio: 16/9; }
        .img-render { height: auto; max-height: 500px; object-fit: contain; }

        /* Overlay para abrir a prova grande */
        #zoomOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display:none; justify-content:center; align-items:center; z-index:1000; cursor: pointer; }
        #zoomContent { max-width: 90%; max-height: 90%; border: 2px solid var(--gold); border-radius: 5px; }

        /* Admin */
        #adminPanel { background: #0a0a0a; border: 1px solid var(--gold); padding: 20px; margin-top: 20px; display: none; border-radius: 8px; }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; background: #151515; border: 1px solid #333; color: white; border-radius: 5px; box-sizing: border-box; }
        .btn-save { background: var(--gold); color: black; font-weight: bold; border: none; padding: 15px; cursor: pointer; width: 100%; text-transform: uppercase; border-radius: 5px; }
        .btn-del { color: #ff4444; background: none; border: 1px solid #442222; cursor: pointer; font-size: 10px; padding: 5px 10px; margin-top: 10px; border-radius: 4px; }
        
        #loginOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); display:none; justify-content:center; align-items:center; z-index:999; }
    </style>
</head>
<body>

<header>
    <div style="color: var(--gold); font-weight: bold; letter-spacing: 2px;">CÚPULA ADM</div>
    <button onclick="document.getElementById('loginOverlay').style.display='flex'" style="background:none; border: 1px solid var(--gold); color: var(--gold); padding: 5px 15px; cursor: pointer;">ACESSO</button>
</header>

<nav>
    <button onclick="tab('membros')" id="b-membros" class="active">Membros</button>
    <button onclick="tab('provas')" id="b-provas">Arquivos de Prova</button>
</nav>

<div class="container">
    <div id="t-membros" class="tab-content active"><div id="listM" class="grid"></div></div>
    
    <div id="t-provas" class="tab-content"><div id="listP"></div></div>

    <div id="adminPanel">
        <h3 style="color: var(--gold); margin-top:0;">Novo Registro</h3>
        <select id="tipo" onchange="toggleForm()">
            <option value="m">Membro</option>
            <option value="p">Prova (Foto/Vídeo)</option>
        </select>
        
        <div id="fMembro">
            <input type="text" id="nome" placeholder="Nome">
            <input type="text" id="idU" placeholder="ID Único">
        </div>

        <div id="fProva" style="display:none;">
            <input type="text" id="titulo" placeholder="Título da Prova">
            <input type="text" id="linkYt" placeholder="Link YouTube (Opcional)">
        </div>

        <div style="margin:10px 0;">
            <label style="font-size: 11px; color: gray;">Upload de Arquivo:</label>
            <input type="file" id="arquivo" accept="image/*,video/*">
        </div>

        <textarea id="obs" placeholder="Observações"></textarea>
        <button class="btn-save" onclick="salvarDados()">Enviar para Arquivos</button>
    </div>
</div>

<div id="zoomOverlay" onclick="this.style.display='none'">
    <div id="zoomBox" onclick="event.stopPropagation()">
        </div>
</div>

<div id="loginOverlay">
    <div style="background:#111; padding:30px; border:1px solid var(--gold); text-align:center; border-radius:8px;">
        <input type="password" id="pass" placeholder="Senha">
        <button class="btn-save" onclick="logar()">Entrar</button>
    </div>
</div>

<script>
    const SENHA_MASTER = "123";
    let logado = false;

    function tab(t) {
        document.querySelectorAll('.tab-content, nav button').forEach(e => e.classList.remove('active'));
        document.getElementById('t-'+t).classList.add('active');
        document.getElementById('b-'+t).classList.add('active');
    }

    function toggleForm() {
        const isP = document.getElementById('tipo').value === 'p';
        document.getElementById('fMembro').style.display = isP ? 'none' : 'block';
        document.getElementById('fProva').style.display = isP ? 'block' : 'none';
    }

    function logar() {
        if(document.getElementById('pass').value === SENHA_MASTER) {
            logado = true;
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            render();
        } else alert("Acesso Negado");
    }

    // Função para abrir a prova grande
    function abrirProva(midia, tipo) {
        const overlay = document.getElementById('zoomOverlay');
        const box = document.getElementById('zoomBox');
        box.innerHTML = '';

        if(tipo === 'foto') {
            box.innerHTML = `<img src="${midia}" id="zoomContent">`;
        } else if (tipo === 'video') {
            box.innerHTML = `<video src="${midia}" id="zoomContent" controls autoplay></video>`;
        } else if (tipo === 'youtube') {
            const id = midia.match(/(?:youtu\.be\/|youtube\.com\/watch\?v=)([^&]+)/)[1];
            box.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}" id="zoomContent" style="width:80vw; height:45vw;" allowfullscreen></iframe>`;
        }
        overlay.style.display = 'flex';
    }

    const converterBase64 = f => new Promise((res) => {
        const r = new FileReader();
        r.onload = () => res(r.result);
        r.readAsDataURL(f);
    });

    async function salvarDados() {
        let db = JSON.parse(localStorage.getItem('cupula_arquivos') || '{"membros":[],"provas":[]}');
        const tipo = document.getElementById('tipo').value;
        const file = document.getElementById('arquivo').files[0];
        let midiaBase64 = "";
        let tipoArquivo = "";

        if(file) {
            midiaBase64 = await converterBase64(file);
            tipoArquivo = file.type.startsWith('image') ? 'foto' : 'video';
        }

        if(tipo === 'm') {
            db.membros.push({ uid: Date.now(), nome: document.getElementById('nome').value, id: document.getElementById('idU').value, foto: midiaBase64 });
        } else {
            const yt = document.getElementById('linkYt').value;
            db.provas.push({ 
                uid: Date.now(), 
                titulo: document.getElementById('titulo').value, 
                src: yt || midiaBase64, 
                tipo: yt ? 'youtube' : tipoArquivo,
                obs: document.getElementById('obs').value 
            });
        }

        localStorage.setItem('cupula_arquivos', JSON.stringify(db));
        render();
        alert("Enviado com sucesso para a aba de arquivos!");
        document.querySelectorAll('input:not([type=password]), textarea').forEach(i => i.value = "");
    }

    function excluir(cat, id) {
        if(!confirm("Deseja remover este arquivo?")) return;
        let db = JSON.parse(localStorage.getItem('cupula_arquivos'));
        db[cat] = db[cat].filter(i => i.uid !== id);
        localStorage.setItem('cupula_arquivos', JSON.stringify(db));
        render();
    }

    function render() {
        const db = JSON.parse(localStorage.getItem('cupula_arquivos') || '{"membros":[],"provas":[]}');
        const listM = document.getElementById('listM');
        const listP = document.getElementById('listP');
        
        listM.innerHTML = '';
        db.membros.forEach(m => {
            listM.innerHTML += `<div class="card" onclick="abrirProva('${m.foto}','foto')">
                <img src="${m.foto || 'https://via.placeholder.com/70'}">
                <h5>${m.nome}</h5>
                ${logado ? `<button class="btn-del" onclick="event.stopPropagation(); excluir('membros',${m.uid})">Remover</button>` : ''}
            </div>`;
        });

        listP.innerHTML = '';
        db.provas.forEach(p => {
            let visual = "";
            if(p.tipo === 'youtube') {
                const id = p.src.match(/(?:youtu\.be\/|youtube\.com\/watch\?v=)([^&]+)/)[1];
                visual = `<iframe src="https://www.youtube.com/embed/${id}"></iframe>`;
            } else if(p.tipo === 'foto') {
                visual = `<img src="${p.src}" class="img-render">`;
            } else {
                visual = `<video><source src="${p.src}"></video>`;
            }

            listP.innerHTML += `<div class="prova-item">
                <h3 style="color:var(--gold);margin:0;">${p.titulo}</h3>
                <p style="font-size:13px; color:gray; margin:5px 0;">${p.obs}</p>
                <div class="media-box" onclick="abrirProva('${p.src}','${p.tipo}')">${visual}</div>
                ${logado ? `<button class="btn-del" onclick="excluir('provas',${p.uid})">Excluir Prova</button>` : ''}
            </div>`;
        });
    }
    render();
</script>
</body>
</html>
